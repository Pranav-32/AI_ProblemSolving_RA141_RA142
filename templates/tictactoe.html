<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav><a href="/">← Home</a></nav>
  <main class="page">
    <section class="card">
      <h1>Interactive Game AI: Tic-Tac-Toe</h1>
      <p>You are X. The AI is O. Choose an algorithm and try to beat the computer.</p>
      <div class="toolbar">
        <label>AI Method
          <select id="method">
            <option value="alphabeta">Alpha-Beta Pruning</option>
            <option value="minimax">Minimax</option>
          </select>
        </label>
        <button onclick="resetGame()">Reset</button>
      </div>
      <div id="board" class="ttt-board"></div>
      <h2 id="status">Your turn</h2>
      <div class="metrics">
        <p><strong>Nodes explored:</strong> <span id="nodes">0</span></p>
        <p><strong>Execution time:</strong> <span id="time">0</span> ms</p>
      </div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/tictactoe.js') }}"></script>
</body>
</html>
